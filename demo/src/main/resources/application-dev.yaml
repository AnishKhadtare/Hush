spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

stripe:
  api:
    secret: ${STRIPE_API_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET_KEY}

client:
  url: ${CLIENT_URL}

jwt:
  secretKey: ${JWT_SECRET_KEY}

logging:
  level:
    root : INFO
    com.socialApp.demo: DEBUG